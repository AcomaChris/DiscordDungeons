services:
  ws-server:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - WS_PORT=3001
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - GITHUB_API_TOKEN=${GITHUB_API_TOKEN}
      - BEHAVIOR_ENGINE_API_KEY=${BEHAVIOR_ENGINE_API_KEY}
      - CORS_ORIGIN=https://discorddungeons.com,https://raveroyale.com
